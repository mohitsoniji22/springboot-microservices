server:
    port: 9191

spring:
    application:
        name: payment-service

# ===================================================
# DEFAULT / PROD PROFILE
# ===================================================
---
spring:
    config:
        activate:
            on-profile: default

    cloud:
        config:
            uri: http://config-server:9196

# ===================================================
# TEST PROFILE
# ===================================================
---
spring:
    config:
        activate:
            on-profile: test

    cloud:
        config:
            enabled: false
            #import-check:
            #  enabled: false

    datasource:
        url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driver-class-name: org.h2.Driver
        username: sa
        password:

    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.H2Dialect

    h2:
        console:
            enabled: true


logging:
    file:
        name: logs/microservices.log