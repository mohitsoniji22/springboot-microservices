# ===================================================
# COMMON CONFIG (applies to all profiles)
# ===================================================
spring:
  application:
    name: order-service

server:
  port: 9192

# ===================================================
# DEFAULT / PROD PROFILE
# ===================================================
---
spring:
  config:
    activate:
      on-profile: default

  cloud:
    config:
      uri: http://localhost:9196

# ===================================================
# TEST PROFILE
# ===================================================
---
spring:
  config:
    activate:
      on-profile: test

  cloud:
    config:
      enabled: false
      #import-check:
      #  enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

# external service dummy values (NOT under spring)
microservices:
  payment-service:
    endpoints:
      endpoint:
        url: http://localhost:9191/payments
