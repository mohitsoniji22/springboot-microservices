server:
  port: 9192

spring:
  datasource:
    url: jdbc:h2:tcp://localhost:9092/~/test
    driver-class-name: org.h2.Driver
    username: sa
    password: Abc@010101
  h2:
    console:
      enabled: true
  application:
    name: ORDER-SERVICE

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always


resilience4j:
  circuitbreaker:
    instances:
      userService:
        registerHealthIndicator: true
        eventConsumerBufferSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED


  retry:
    instances:
      userService:
        maxRetryAttempts: 5
        waitDuration: 10s

logging:
  file:
    name: /Users/mohit_soni/Practice/personal/springboot-microservices/logs/microservices.log