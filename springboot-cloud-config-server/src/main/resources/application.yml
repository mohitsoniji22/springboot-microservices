spring:
    application:
        name: CONFIG-SERVER
    cloud:
        config:
            server:
                git:
                    uri: https://github.com/your-org/config-repo
                    default-label: main
                    clone-on-start: true

server:
    port: 9196

eureka:
    client:
        serviceUrl:
            defaultZone: http://service-registry:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true